<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endee AI Semantic Search</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">▲</span>
                <h1>Endee Semantic Search</h1>
            </div>
            <p class="subtitle">Search for movies by their deeper meaning, rather than just keywords.</p>
        </header>

        <main>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Try 'I want to watch a space adventure...'" autocomplete="off">
                <button id="searchButton" class="btn primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search
                </button>
            </div>

            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <span id="loadingSpan">Embedding your query & searching Endee DB...</span>
            </div>
            
            <div class="add-data-section">
                <h3>Add New Knowledge (Live Embedding)</h3>
                <div class="add-container">
                    <input type="text" id="addTitle" placeholder="Movie Title (ex. Avatar)">
                    <input type="text" id="addDesc" placeholder="Description (ex. A marine goes to an alien planet...)">
                    <button id="addButton" class="btn secondary">
                         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Upload to Endee
                    </button>
                </div>
                <p id="addSuccessMsg" class="success-msg" style="display: none;">Successfully embedded and saved to DB!</p>
            </div>

            <div class="results-container" id="resultsContainer">
                <!-- Search results will appear here -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
